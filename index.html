<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>npm SHA-256 hash fetcher</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-900 antialiased">
    <div class="container mx-auto max-w-2xl px-4 py-12">
      <div class="bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
          npm SHA-256 hash fetcher
        </h1>
        <p class="text-center text-gray-600 mb-8">
          Enter an npm package resource path to find its latest SHA-256 hash.
        </p>

        <!-- Input Form -->
        <div class="space-y-4">
          <div>
            <label
              for="packagePath"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Package Resource Path</label
            >
            <input
              type="text"
              id="packagePath"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="e.g., react/cjs/react.production.js"
            />
            <p class="text-xs text-gray-500 mt-2">
              Format: `package-name/file/path.js` or
              `@scope/package-name/file/path.js` (Examples:
              `react/cjs/react.production.js` or `react`)
            </p>
          </div>

          <button
            id="fetchButton"
            class="w-full flex justify-center items-center px-4 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors duration-200"
          >
            <span id="buttonText">Get File Hash</span>
            <svg
              id="buttonSpinner"
              class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </button>
        </div>

        <!-- Result Display -->
        <div id="resultContainer" class="mt-8 hidden">
          <h2 class="text-xl font-semibold text-gray-800 mb-3">Result</h2>
          <div class="bg-gray-50 p-6 rounded-lg">
            <pre
              id="resultOutput"
              class="text-sm text-left whitespace-pre-wrap break-all font-mono"
            ></pre>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { NPMSHA256HashFetcher } from './index.js';
      /**
       * -----------------------------------------------------------------
       * Demo UI Logic
       * -----------------------------------------------------------------
       * This code connects the JsDelivrFetcher library to the HTML UI.
       */

      document.addEventListener('DOMContentLoaded', () => {
        const fetcher = new NPMSHA256HashFetcher();

        const packagePathInput = document.getElementById('packagePath');
        const fetchButton = document.getElementById('fetchButton');
        const buttonText = document.getElementById('buttonText');
        const buttonSpinner = document.getElementById('buttonSpinner');
        const resultContainer = document.getElementById('resultContainer');
        const resultOutput = document.getElementById('resultOutput');

        // Set default example
        packagePathInput.value = 'react/cjs/react.production.js';

        const handleFetch = async () => {
          const inputValue = packagePathInput.value.trim();
          if (!inputValue) return;

          // Check if multiple (comma-separated) or single
          const resources = inputValue.includes(',')
            ? inputValue
                .split(',')
                .map((p) => p.trim())
                .filter((p) => p.length > 0)
            : inputValue; // Pass as a single string

          // Handle empty array after filter
          if (Array.isArray(resources) && resources.length === 0) return;

          // --- Set UI to loading state ---
          fetchButton.disabled = true;
          buttonText.classList.add('hidden');
          buttonSpinner.classList.remove('hidden');
          resultContainer.classList.add('hidden');
          resultOutput.className =
            'text-sm text-left whitespace-pre-wrap break-all font-mono'; // Reset classes

          try {
            // 'resources' is now either a string or string[]
            // 'results' will be an array of settled promises.
            const results = await fetcher.getHexHashForResource(resources);

            // We need the original input paths for labeling.
            const paths = Array.isArray(resources) ? resources : [resources];

            const output = results
              .map((result, index) => {
                let data;
                if (result.status === 'fulfilled') {
                  data = JSON.stringify(result.value, null, 2);
                } else {
                  data = JSON.stringify(
                    { Error: result.reason?.message || 'Unknown error' },
                    null,
                    2
                  );
                }
                return data;
              })
              .join('\n\n');

            // --- Display success ---
            resultOutput.classList.add('text-gray-900');
            resultOutput.textContent = output;
          } catch (error) {
            // This catch block is for catastrophic errors, individual ones are handled by allSettled
            console.error('Fetch Error:', error);
            resultOutput.classList.add('text-red-600');
            resultOutput.textContent = `Error: ${error.message}`;
          } finally {
            // --- Reset UI from loading state ---
            fetchButton.disabled = false;
            buttonText.classList.remove('hidden');
            buttonSpinner.classList.add('hidden');
            resultContainer.classList.remove('hidden');
          }
        };

        fetchButton.addEventListener('click', handleFetch);
        packagePathInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            handleFetch();
          }
        });
      });
    </script>
  </body>
</html>
